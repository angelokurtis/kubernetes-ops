                          type: integer
                        tls:
                          description: TLS configures TLS for the HTTP client.
                          properties:
                            ca:
                              description: CA sets the CA bundle used to verify the server certificate.
                              type: string
                            insecureSkipVerify:
                              description: |-
                                InsecureSkipVerify skips the server certificate validation.
