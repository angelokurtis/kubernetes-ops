                          type: string
                        url:
                          description: URL of the Authorization Server.
                          type: string
                      required:
                        - url
                      type: object
                    forwardHeaders:
                      additionalProperties:
                        type: string
                      type: object
                    tokenSource:
                      description: |-
                        TokenSource describes how to extract tokens from HTTP requests.
                        If multiple sources are set, the order is the following: header > query > cookie.
                      properties:
                        cookie:
                          description: Cookie is the name of a cookie.
                          type: string
                        header:
                          description: Header is the name of a header.
                          type: string
                        headerAuthScheme:
                          description: |-
                            HeaderAuthScheme sets an optional auth scheme when Header is set to "Authorization".
                            If set, this scheme is removed from the token, and all requests not including it are dropped.
                          type: string
                        query:
                          description: Query is the name of a query parameter.
                          type: string
                      type: object
                  required:
                    - clientConfig
                    - tokenSource
                  type: object
                oidc:
                  description: AccessControlPolicyOIDC holds the OIDC authentication configuration.
                  properties:
                    authParams:
                      additionalProperties:
                        type: string
                      type: object
                    claims:
                      type: string
                    clientId:
                      type: string
                    disableAuthRedirectionPaths:
                      items:
                        type: string
                      type: array
                    forwardHeaders:
                      additionalProperties:
                        type: string
                      type: object
                    issuer:
                      type: string
                    logoutUrl:
                      type: string
                    redirectUrl:
                      type: string
                    scopes:
                      items:
                        type: string
                      type: array
                    secret:
                      description: |-
                        SecretReference represents a Secret Reference. It has enough information to retrieve secret
                        in any namespace
                      properties:
                        name:
                          description: name is unique within a namespace to reference a secret resource.
                          type: string
                        namespace:
                          description: namespace defines the space within which the secret name must be unique.
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    session:
                      description: Session holds session configuration.
                      properties:
                        domain:
                          type: string
                        path:
                          type: string
                        refresh:
                          type: boolean
                        sameSite:
                          type: string
                        secure:
                          type: boolean
                      type: object
                    stateCookie:
                      description: StateCookie holds state cookie configuration.
                      properties:
                        domain:
                          type: string
                        path:
                          type: string
                        sameSite:
                          type: string
                        secure:
                          type: boolean
                      type: object
                  type: object
                oidcGoogle:
                  description: AccessControlPolicyOIDCGoogle holds the Google OIDC authentication configuration.
                  properties:
                    authParams:
                      additionalProperties:
                        type: string
                      type: object
                    clientId:
                      type: string
                    emails:
                      description: Emails are the allowed emails to connect.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    forwardHeaders:
                      additionalProperties:
                        type: string
                      type: object
                    logoutUrl:
                      type: string
                    redirectUrl:
                      type: string
                    secret:
                      description: |-
                        SecretReference represents a Secret Reference. It has enough information to retrieve secret
                        in any namespace
                      properties:
                        name:
                          description: name is unique within a namespace to reference a secret resource.
                          type: string
                        namespace:
                          description: namespace defines the space within which the secret name must be unique.
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    session:
                      description: Session holds session configuration.
                      properties:
                        domain:
                          type: string
                        path:
                          type: string
                        refresh:
                          type: boolean
                        sameSite:
                          type: string
                        secure:
                          type: boolean
                      type: object
                    stateCookie:
                      description: StateCookie holds state cookie configuration.
                      properties:
                        domain:
                          type: string
                        path:
                          type: string
                        sameSite:
                          type: string
                        secure:
                          type: boolean
                      type: object
                  type: object
              type: object
            status:
              description: The current status of this access control policy.
              properties:
                specHash:
                  type: string
                syncedAt:
                  format: date-time
                  type: string
                version:
                  type: string
              type: object
          type: object
      served: true
      storage: true

